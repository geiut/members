name: Update Data Daily

on:
  schedule:
    # 每天凌晨3点自动运行
    - cron: '0 3 * * *'
  workflow_dispatch:
  # 手动触发
  push:
    branches:
      - main

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3'

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c("httr", "jsonlite", "dplyr", "stringr", "ggplot2", "tidyr", "showtext"), repos="https://cloud.r-project.org")'

      - name: Fetch latest issue data
        run: |
          # 获取 Issue 1 数据
          gh api repos/D2RS-2026spring/members/issues/1/comments --paginate > /tmp/issue1_comments.json
          
          # 获取 Issue 2 数据
          gh api repos/D2RS-2026spring/members/issues/2/comments --paginate > /tmp/issue2_comments.json

      - name: Render Quarto documents
        run: |
          quarto render

      - name: Deploy to gh-pages
        run: |
          # 保存主分支构建的文件
          cp -r _site ../site_backup
          
          # 切换到 gh-pages 分支
          git fetch origin gh-pages
          git checkout gh-pages
          
          # 删除旧的网站文件
          rm -rf *.html *_files site_libs search.json .nojekyll
          
          # 复制新构建的网站文件
          cp -r ../site_backup/* .
          cp ../site_backup/.nojekyll . 2>/dev/null || true
          
          # 提交更改
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git diff --quiet --cached || git commit -m "Deploy $(date +%Y-%m-%d)"
          
          # 推送
          git push origin gh-pages

      - name: Commit and push changes to main
        run: |
          git checkout main
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git diff --quiet --cached || git commit -m "Update data $(date +%Y-%m-%d)"
          git push origin main

  # 删除7天前的旧提交
  cleanup:
    needs: update
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0
          persist-credentials: false

      - name: Clean old commits
        run: |
          # 获取7天前的提交
          cutoff_date=$(date -d '7 days ago' +%Y-%m-%d)
          cutoff_commit=$(git log --before="$cutoff_date" -n 1 --format=%H)
          
          if [ -n "$cutoff_commit" ]; then
            # 创建新分支，保留7天内的提交
            git checkout --orphan new_gh_pages $cutoff_commit
            git commit -m "Cleanup: Keep only commits from the last 7 days"
            git branch -D gh-pages
            git branch -m gh-pages
            git push origin gh-pages --force
          else
            echo "No commits older than 7 days found"
          fi
